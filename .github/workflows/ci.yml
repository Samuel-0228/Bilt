name: CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Check Formatting
        run: npm run format -- --check

      - name: Run Linter
        run: npm run lint

  typecheck:
    name: TypeScript Compilation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Build Code
        run: npm run build

  unit-tests:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Build Code
        run: npm run build

      - name: Run Unit Tests with Coverage
        run: npm run test:coverage

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Build Code
        run: npm run build

      - name: Run Integration Tests
        run: npm run test:integration

  regression-tests:
    name: Regression Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Run Regression Tests
        run: npm run test:regression

  fuzz-tests:
    name: Fuzz Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Run Fuzz Tests
        run: npm run test:fuzz

  perf-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Run Performance Tests
        run: npm run test:perf

  cross-platform:
    name: Cross-Platform Matrix
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    needs: typecheck
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Build Code
        run: npm run build

      - name: Run Unit Tests
        run: npm run test:unit

  release-gate:
    name: Release Gate
    runs-on: ubuntu-latest
    needs:
      [
        lint,
        typecheck,
        unit-tests,
        integration-tests,
        regression-tests,
        fuzz-tests,
        perf-tests,
        cross-platform,
      ]
    if: always()
    steps:
      - name: Check Pipeline Status
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.typecheck.result }}" != "success" ] || \
             [ "${{ needs.unit-tests.result }}" != "success" ] || \
             [ "${{ needs.integration-tests.result }}" != "success" ] || \
             [ "${{ needs.regression-tests.result }}" != "success" ] || \
             [ "${{ needs.fuzz-tests.result }}" != "success" ] || \
             [ "${{ needs.perf-tests.result }}" != "success" ] || \
             [ "${{ needs.cross-platform.result }}" != "success" ]; then
            echo "Pipeline has failures. Release blocked!"
            exit 1
          else
            echo "All tests passed. Pipeline clean!"
          fi
